version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    restart: always
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-rag_bootcamp}
      - POSTGRES_USER=${DB_USER:-rag_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rag_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rag_user} -d ${DB_NAME:-rag_bootcamp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rag-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db  # Internal network name
      - DB_PORT=5432 # Internal container port
    volumes:
      - .:/app
    stdin_open: true
    tty: true

volumes:
  postgres_data:
